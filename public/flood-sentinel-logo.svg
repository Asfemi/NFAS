<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ca8a04;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f0f9ff;stop-opacity:0.9" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" fill="url(#logoGradient)" filter="url(#shadow)"/>

  <!-- Shield shape -->
  <path d="M100 25 L160 45 L175 100 L160 155 L100 175 L40 155 L25 100 L40 45 Z"
        fill="url(#shieldGradient)"
        stroke="#16a34a"
        stroke-width="2"/>

  <!-- Farmer hat -->
  <ellipse cx="100" cy="55" rx="25" ry="8" fill="#8b4513"/>
  <ellipse cx="100" cy="50" rx="20" ry="6" fill="#654321"/>

  <!-- Farmer face -->
  <circle cx="100" cy="75" r="15" fill="#fdbcb4"/>
  <circle cx="95" cy="72" r="2" fill="#000"/>
  <circle cx="105" cy="72" r="2" fill="#000"/>
  <path d="M95 80 Q100 85 105 80" stroke="#000" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Water wave lines (representing flood protection) -->
  <path d="M60 120 Q70 115 80 120 Q90 125 100 120 Q110 115 120 120 Q130 125 140 120"
        stroke="#2563eb"
        stroke-width="3"
        fill="none"
        stroke-linecap="round"/>
  <path d="M65 135 Q75 130 85 135 Q95 140 105 135 Q115 130 125 135 Q135 140 145 135"
        stroke="#2563eb"
        stroke-width="3"
        fill="none"
        stroke-linecap="round"/>
  <path d="M70 150 Q80 145 90 150 Q100 155 110 150 Q120 145 130 150 Q140 155 150 150"
        stroke="#2563eb"
        stroke-width="3"
        fill="none"
        stroke-linecap="round"/>

  <!-- Protection barrier lines -->
  <line x1="50" y1="110" x2="150" y2="110" stroke="#16a34a" stroke-width="4" stroke-linecap="round"/>
  <line x1="55" y1="125" x2="145" y2="125" stroke="#16a34a" stroke-width="4" stroke-linecap="round"/>
  <line x1="60" y1="140" x2="140" y2="140" stroke="#16a34a" stroke-width="4" stroke-linecap="round"/>
  <line x1="65" y1="155" x2="135" y2="155" stroke="#16a34a" stroke-width="4" stroke-linecap="round"/>

  <!-- Text -->
  <text x="100" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#16a34a">
    FLOOD SENTINEL
  </text>
  <text x="100" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#ea580c">
    NIGERIA
  </text>
</svg>